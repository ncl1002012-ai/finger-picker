<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Picker</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono:wght@400;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0f;--sur:#13131d;--bor:#1e1e2e;--acc:#00ffcc;--txt:#e8e8f0;--dim:#3a3a55}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:'Syne',sans-serif;color:var(--txt);touch-action:none;user-select:none;-webkit-user-select:none}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,255,204,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,204,0.03) 1px,transparent 1px);background-size:55px 55px;pointer-events:none;z-index:0}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at center,transparent 20%,rgba(10,10,15,0.9) 100%);pointer-events:none;z-index:0}

/* ── Nav ── */
#nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:var(–sur);border-top:1px solid var(–bor);display:flex;padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:.6rem .2rem .5rem;gap:.25rem;background:none;border:none;cursor:pointer;color:var(–dim);font-family:‘Space Mono’,monospace;font-size:.5rem;letter-spacing:.08em;text-transform:uppercase;transition:color .2s;touch-action:manipulation}
.nav-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;transition:stroke .2s}
.nav-btn.active{color:var(–acc)}
.nav-indicator{position:absolute;bottom:0;height:2px;background:var(–acc);transition:left .3s cubic-bezier(.34,1.56,.64,1),width .3s;border-radius:2px 2px 0 0}

/* ── Screens ── */
.screen{position:fixed;inset:0;bottom:60px;display:none;flex-direction:column;align-items:center;justify-content:center}
.screen.active{display:flex}

/* ── Canvases ── */
#lc,#pc{position:fixed;inset:0;bottom:60px;pointer-events:none}
#lc{z-index:8}#pc{z-index:15}

/* ── Dots ── */
.dot{position:fixed;width:80px;height:80px;border-radius:50%;transform:translate(-50%,-50%) scale(0);pointer-events:none;z-index:5;transition:transform .2s cubic-bezier(.34,1.56,.64,1);display:flex;align-items:center;justify-content:center}
.dot.on{transform:translate(-50%,-50%) scale(1)}
.di{width:58px;height:58px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:‘Space Mono’,monospace;font-size:1.1rem;font-weight:700;position:relative}
.dr{position:absolute;inset:-12px;border-radius:50%;border:2px solid;opacity:.4;animation:pr 1.6s ease-in-out infinite}
@keyframes pr{0%,100%{transform:scale(1);opacity:.4}50%{transform:scale(1.18);opacity:.12}}
.dot.winner .di{animation:wp .55s cubic-bezier(.34,1.56,.64,1) forwards}
@keyframes wp{0%{transform:scale(1)}50%{transform:scale(1.5)}100%{transform:scale(1.25)}}
.dot.loser{animation:lo .3s ease forwards}
@keyframes lo{to{transform:translate(-50%,-50%) scale(0);opacity:0}}

/* ── Finger screen ── */
#finger-idle{position:absolute;inset:0;bottom:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;pointer-events:none;transition:opacity .4s;z-index:10}
#finger-idle h1{font-size:clamp(2.5rem,8vw,5rem);font-weight:800;background:linear-gradient(135deg,var(–acc),#00aaff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;margin-bottom:.4em}
#finger-idle p{font-family:‘Space Mono’,monospace;font-size:clamp(.6rem,2vw,.8rem);color:var(–dim);letter-spacing:.18em;text-transform:uppercase}
#dc{position:fixed;top:1.2rem;left:50%;transform:translateX(-50%);font-family:‘Space Mono’,monospace;font-size:.7rem;letter-spacing:.12em;color:var(–dim);z-index:20;pointer-events:none;transition:color .3s}
#dc.on{color:var(–acc)}
#pbtn{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) scale(0);z-index:20;background:var(–acc);color:#0a0a0f;font-family:‘Syne’,sans-serif;font-weight:800;font-size:1rem;letter-spacing:.1em;text-transform:uppercase;border:none;border-radius:100px;padding:.85rem 2.4rem;cursor:pointer;box-shadow:0 0 30px rgba(0,255,204,.4);transition:transform .3s cubic-bezier(.34,1.56,.64,1);touch-action:manipulation}
#pbtn.show{transform:translateX(-50%) scale(1)}

/* ── Settings tiny btn ── */
#sb{position:fixed;top:.9rem;left:.9rem;z-index:50;width:20px;height:20px;background:none;border:none;cursor:pointer;opacity:.2;transition:opacity .2s;padding:0;touch-action:manipulation}
#sb:hover,#sb:focus{opacity:.6;outline:none}
#sb svg{width:100%;height:100%;fill:none;stroke:var(–txt);stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
#sp{position:fixed;top:2.6rem;left:.9rem;z-index:200;background:var(–sur);border:1px solid var(–bor);border-radius:12px;padding:.9rem 1rem;min-width:185px;box-shadow:0 8px 32px rgba(0,0,0,.6);transform-origin:top left;transform:scale(0);opacity:0;transition:transform .2s cubic-bezier(.34,1.56,.64,1),opacity .15s;pointer-events:none}
#sp.open{transform:scale(1);opacity:1;pointer-events:all}
#sp h3{font-family:‘Space Mono’,monospace;font-size:.58rem;letter-spacing:.25em;text-transform:uppercase;color:var(–dim);margin-bottom:.7rem}
.mo{display:flex;align-items:flex-start;gap:.55rem;padding:.5rem 0;cursor:pointer}
.mo:not(:last-child){border-bottom:1px solid var(–bor)}
.mr{width:13px;height:13px;border-radius:50%;border:2px solid var(–dim);flex-shrink:0;margin-top:3px;position:relative;transition:border-color .2s}
.mr::after{content:’’;position:absolute;inset:2px;border-radius:50%;background:var(–acc);transform:scale(0);transition:transform .2s cubic-bezier(.34,1.56,.64,1)}
.mo.sel .mr{border-color:var(–acc)}
.mo.sel .mr::after{transform:scale(1)}
.mt{font-size:.78rem;font-weight:700;color:var(–txt);margin-bottom:.12rem}
.md{font-family:‘Space Mono’,monospace;font-size:.56rem;color:var(–dim);line-height:1.5}

/* ── SPINNER SCREEN ── */
#spinner-screen{gap:0}

#spinner-hint{font-family:‘Space Mono’,monospace;font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;color:var(–dim);margin-bottom:.8rem;text-align:center;flex-shrink:0}
#spinner-wrap{position:relative;flex-shrink:0;display:flex;align-items:center;justify-content:center}
#spinner-canvas{display:block;border-radius:50%;filter:drop-shadow(0 0 24px rgba(0,255,204,.25));pointer-events:auto;touch-action:none;cursor:pointer}
#spin-tap-btn{position:absolute;inset:0;border-radius:50%;background:none;border:none;cursor:pointer;touch-action:manipulation;z-index:5;-webkit-tap-highlight-color:transparent}
#spinner-result{font-family:‘Space Mono’,monospace;font-size:.75rem;letter-spacing:.2em;text-transform:uppercase;color:var(–acc);text-align:center;margin-top:.8rem;opacity:0;transition:opacity .4s;height:1.4em;flex-shrink:0}
#spinner-result.show{opacity:1}

/* ── COIN FLIP SCREEN ── */
#coin-screen{position:fixed;inset:0;bottom:60px;display:none;flex-direction:column;align-items:center;justify-content:center;gap:2rem}
#coin-screen.active{display:flex}
#coin-wrap{perspective:600px;width:140px;height:140px;cursor:pointer;touch-action:manipulation}
#coin{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .8s cubic-bezier(.4,0,.2,1)}
#coin.flip{animation:coinflip 1s ease forwards}
@keyframes coinflip{
0%{transform:rotateY(0)}
100%{transform:rotateY(var(–flips))}
}
.coin-face{position:absolute;inset:0;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2.5rem;backface-visibility:hidden;-webkit-backface-visibility:hidden}
#coin-heads{background:radial-gradient(circle at 35% 35%,#ffd700,#b8860b);box-shadow:0 0 30px rgba(255,215,0,.5),inset 0 2px 4px rgba(255,255,255,.3)}
#coin-tails{background:radial-gradient(circle at 35% 35%,#c0c0c0,#808080);box-shadow:0 0 30px rgba(192,192,192,.4),inset 0 2px 4px rgba(255,255,255,.3);transform:rotateY(180deg)}
#coin-result{font-size:clamp(2rem,10vw,4rem);font-weight:800;letter-spacing:.05em;opacity:0;transition:opacity .4s;text-align:center}
#coin-result.heads{color:#ffd700;filter:drop-shadow(0 0 20px #ffd700)}
#coin-result.tails{color:#c0c0c0;filter:drop-shadow(0 0 20px #c0c0c0)}
#coin-result.show{opacity:1}
#coin-hint{font-family:‘Space Mono’,monospace;font-size:.7rem;letter-spacing:.18em;text-transform:uppercase;color:var(–dim);text-align:center}
#coin-streak{font-family:‘Space Mono’,monospace;font-size:.65rem;color:var(–dim);letter-spacing:.1em;text-align:center;min-height:1.2em}
</style>

</head>
<body>

<canvas id="lc"></canvas>
<canvas id="pc"></canvas>

<!-- Settings -->

<button id="sb" aria-label="Settings">
  <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
</button>
<div id="sp">
  <h3>Finger Mode</h3>
  <div class="mo sel" data-mode="hold"><div class="mr"></div><div><div class="mt">Hold</div><div class="md">Keep fingers down.<br>Lift = restart.</div></div></div>
  <div class="mo" data-mode="tap"><div class="mr"></div><div><div class="mt">Tap to Place</div><div class="md">Tap drops a dot.<br>No finger limit.</div></div></div>
</div>

<!-- Finger Picker Screen -->

<div id="finger-screen" class="screen active">
  <div id="finger-idle">
    <h1>FINGER<br>PICKER</h1>
    <p id="isub">Place fingers — hold still</p>
  </div>
</div>
<div id="dc">0 dots</div>
<button id="pbtn">Pick ✦</button>

<!-- Spinner Screen -->

<div id="spinner-screen" class="screen">
  <p id="spinner-hint">tap the wheel to spin</p>
  <canvas id="spinner-canvas" id="spinner-canvas"></canvas>
  <div id="spinner-result"></div>
</div>

<!-- Coin Flip Screen -->

<div id="coin-screen">
  <div id="coin-streak"></div>
  <div id="coin-wrap">
    <div id="coin">
      <div class="coin-face" id="coin-heads">🌟</div>
      <div class="coin-face" id="coin-tails">⚡</div>
    </div>
  </div>
  <div id="coin-result"></div>
  <div id="coin-hint">tap the coin to flip</div>
</div>

<!-- Nav -->

<nav id="nav">
  <div class="nav-indicator" id="nav-ind"></div>
  <button class="nav-btn active" data-screen="finger-screen">
    <svg viewBox="0 0 24 24"><path d="M18 11V6a2 2 0 0 0-4 0v5M14 11V4a2 2 0 0 0-4 0v7M10 11V5a2 2 0 0 0-4 0v9l-1.5-1.5A1.5 1.5 0 0 0 3 14v.5C3 19 7 22 12 22s9-3 9-7.5V11a2 2 0 0 0-4 0"/></svg>
    Fingers
  </button>
  <button class="nav-btn" data-screen="spinner-screen">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
    Spinner
  </button>
  <button class="nav-btn" data-screen="coin-screen">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v2M12 16v2M9 9h4a2 2 0 0 1 0 4h-2a2 2 0 0 0 0 4h4"/></svg>
    Coin
  </button>
</nav>

<script>
// ═══════════════════════════════════════════════════════════════════
// SHARED
// ═══════════════════════════════════════════════════════════════════
const COLORS=[
  {bg:'#00ffcc',tx:'#0a0a0f',gl:'rgba(0,255,204,0.7)'},
  {bg:'#ff3366',tx:'#fff',gl:'rgba(255,51,102,0.7)'},
  {bg:'#ffd700',tx:'#0a0a0f',gl:'rgba(255,215,0,0.7)'},
  {bg:'#aa44ff',tx:'#fff',gl:'rgba(170,68,255,0.7)'},
  {bg:'#00aaff',tx:'#fff',gl:'rgba(0,170,255,0.7)'},
  {bg:'#ff6600',tx:'#fff',gl:'rgba(255,102,0,0.7)'},
  {bg:'#00ff88',tx:'#0a0a0f',gl:'rgba(0,255,136,0.7)'},
  {bg:'#ff44cc',tx:'#fff',gl:'rgba(255,68,204,0.7)'},
  {bg:'#44ffee',tx:'#0a0a0f',gl:'rgba(68,255,238,0.7)'},
  {bg:'#ffaa00',tx:'#0a0a0f',gl:'rgba(255,170,0,0.7)'},
  {bg:'#ff4444',tx:'#fff',gl:'rgba(255,68,68,0.7)'},
  {bg:'#fffbe6',tx:'#0a0a0f',gl:'rgba(255,251,230,0.7)'},
];

const lc=document.getElementById('lc'),lx=lc.getContext('2d');
const pc=document.getElementById('pc'),px=pc.getContext('2d');
function resize(){lc.width=pc.width=innerWidth;lc.height=pc.height=innerHeight}
resize();addEventListener('resize',resize);

let particles=[],bolts=[];
function burst(x,y,col,n=45){
  for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=3+Math.random()*10;particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,decay:.018+Math.random()*.025,sz:3+Math.random()*7,col})}
}
function seg(ax,ay,bx,by,d){
  if(d===0)return[[ax,ay],[bx,by]];
  const r=80/(d+1),mx=(ax+bx)/2+(Math.random()-.5)*r,my=(ay+by)/2+(Math.random()-.5)*r;
  return[...seg(ax,ay,mx,my,d-1),...seg(mx,my,bx,by,d-1).slice(1)];
}
function flashAll(dl){
  for(let i=0;i<dl.length;i++)for(let j=i+1;j<dl.length;j++){
    const a=dl[i],b=dl[j];bolts.push({pts:seg(a.x,a.y,b.x,b.y,4),ca:a.color.bg,life:1});
  }
}
(function loop(){
  lx.clearRect(0,0,lc.width,lc.height);
  bolts=bolts.filter(b=>b.life>0);
  for(const b of bolts){
    b.life-=.03;lx.save();lx.globalAlpha=Math.max(0,b.life);lx.shadowBlur=16;lx.shadowColor=b.ca;
    lx.strokeStyle=b.ca;lx.lineWidth=1+b.life*2;
    lx.beginPath();lx.moveTo(b.pts[0][0],b.pts[0][1]);
    for(let k=1;k<b.pts.length;k++)lx.lineTo(b.pts[k][0],b.pts[k][1]);
    lx.stroke();lx.restore();
    if(Math.random()<.35){const p=b.pts;b.pts=seg(p[0][0],p[0][1],p[p.length-1][0],p[p.length-1][1],4)}
  }
  px.clearRect(0,0,pc.width,pc.height);
  particles=particles.filter(p=>p.life>0);
  for(const p of particles){
    p.x+=p.vx;p.y+=p.vy;p.vy+=.25;p.vx*=.97;p.life-=p.decay;
    px.globalAlpha=Math.max(0,p.life);px.fillStyle=p.col;
    px.beginPath();px.arc(p.x,p.y,p.sz*p.life,0,Math.PI*2);px.fill();
  }
  px.globalAlpha=1;requestAnimationFrame(loop);
})();

// ═══════════════════════════════════════════════════════════════════
// NAV
// ═══════════════════════════════════════════════════════════════════
let currentScreen='finger-screen';
const navBtns=document.querySelectorAll('.nav-btn');
const navInd=document.getElementById('nav-ind');
const sbEl=document.getElementById('sb');
const spEl=document.getElementById('sp');

function switchScreen(id){
  document.querySelectorAll('.screen,#finger-screen,#spinner-screen,#coin-screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  currentScreen=id;
  navBtns.forEach((b,i)=>{
    const active=b.dataset.screen===id;
    b.classList.toggle('active',active);
    if(active){
      const bw=innerWidth/navBtns.length;
      navInd.style.left=(i*bw+bw*.25)+'px';
      navInd.style.width=(bw*.5)+'px';
    }
  });
  // show/hide UI elements per screen
  document.getElementById('dc').style.display=id==='finger-screen'?'':'none';
  document.getElementById('pbtn').style.display=id==='finger-screen'?'':'none';
  document.getElementById('sb').style.display=id==='finger-screen'?'':'none';
  if(id!=='finger-screen'){document.getElementById('wb').classList.remove('show');document.getElementById('rh').classList.remove('show')}
  if(id==="spinner-screen")drawWheel();
}

navBtns.forEach(btn=>{
  function go(e){e.preventDefault();e.stopPropagation();switchScreen(btn.dataset.screen)}
  btn.addEventListener('touchstart',go,{passive:false});
  btn.addEventListener('click',go);
});

// init indicator
setTimeout(()=>{const bw=innerWidth/navBtns.length;navInd.style.left=(0+bw*.25)+'px';navInd.style.width=(bw*.5)+'px'},50);

// ═══════════════════════════════════════════════════════════════════
// FINGER PICKER
// ═══════════════════════════════════════════════════════════════════
let FMODE='hold',FST='idle';
let dots=new Map(),cpool=[...Array(COLORS.length).keys()];
let uid=0,htimer=null,spOpen=false;

const idleEl=document.getElementById('finger-idle');
const isubEl=document.getElementById('isub');
const dcEl=document.getElementById('dc');
const pbtn=document.getElementById('pbtn');

const wnEl=document.getElementById('wn');

function toggleSP(e){e.stopPropagation();e.preventDefault();spOpen=!spOpen;spEl.classList.toggle('open',spOpen)}
sbEl.addEventListener('touchstart',toggleSP,{passive:false});
sbEl.addEventListener('click',toggleSP);
document.addEventListener('touchstart',e=>{if(!spEl.contains(e.target)&&e.target!==sbEl&&spOpen){spOpen=false;spEl.classList.remove('open')}},{passive:true});

document.querySelectorAll('.mo').forEach(opt=>{
  function choose(e){
    e.stopPropagation();e.preventDefault();
    const m=opt.dataset.mode;spOpen=false;spEl.classList.remove('open');
    if(m===FMODE)return;
    FMODE=m;
    document.querySelectorAll('.mo').forEach(o=>o.classList.remove('sel'));
    opt.classList.add('sel');
    isubEl.textContent=FMODE==='hold'?'Place fingers — hold still':'Tap to place dots — then pick';
    fingerReset();applyMode();
  }
  opt.addEventListener('touchstart',choose,{passive:false});
  opt.addEventListener('click',choose);
});

function gc(){if(!cpool.length)cpool=[...Array(COLORS.length).keys()];return cpool.splice(Math.floor(Math.random()*cpool.length),1)[0]}
function fc(i){cpool.push(i)}

function makeDot(id,x,y){
  if(dots.has(id))return;
  const ci=gc(),c=COLORS[ci];
  const el=document.createElement('div');
  el.className='dot';el.style.cssText=`left:${x}px;top:${y}px`;
  el.innerHTML=`<div class="di" style="background:${c.bg};color:${c.tx};box-shadow:0 0 20px ${c.gl},0 0 50px ${c.gl}"><span class="dr" style="border-color:${c.bg}"></span>✦</div>`;
  document.body.appendChild(el);
  requestAnimationFrame(()=>el.classList.add('on'));
  dots.set(id,{el,ci,x,y,color:c});refreshUI();
}
function killDot(id){const d=dots.get(id);if(!d)return;fc(d.ci);d.el.remove();dots.delete(id);refreshUI()}
function refreshUI(){
  const n=dots.size;
  dcEl.textContent=n===1?'1 dot':`${n} dots`;
  dcEl.classList.toggle('on',n>0);
  pbtn.classList.toggle('show',FMODE==='tap'&&n>=2&&FST==='idle');
}

function doPick(){
  if(dots.size<1||FST==='animating'||FST==='result')return;
  FST='animating';pbtn.classList.remove('show');idleEl.style.opacity='0';clearTimeout(htimer);
  const dl=[...dots.values()];let f=0;
  function flash(){
    flashAll(dl);
    dl.forEach(d=>{d.el.style.transition='transform .08s ease';d.el.style.transform=`translate(-50%,-50%) scale(${1.05+Math.random()*.12})`;setTimeout(()=>{if(d.el.isConnected)d.el.style.transform='translate(-50%,-50%) scale(1)'},100)});
    if(++f<10)setTimeout(flash,100+Math.random()*80);
    else setTimeout(reveal,180);
  }
  flash();
}



function reveal(){
  if(!dots.size){fingerReset();return;}
  FST='result';bolts=[];
  const ids=[...dots.keys()];
  const wid=ids[Math.floor(Math.random()*ids.length)];
  for(const[id,d]of dots){
    if(id===wid){
      d.el.style.transition='transform .2s cubic-bezier(.34,1.56,.64,1)';
      d.el.classList.add('winner');d.el.style.zIndex='25';
      burst(d.x,d.y,d.color.bg,70);
    } else {
      d.el.classList.add('loser');setTimeout(()=>d.el.remove(),350);
    }
  }
  dcEl.textContent='tap to reset';
}
function fingerReset(){
  clearTimeout(htimer);FST='idle';bolts=[];
  for(const[,d]of dots)d.el.remove();
  dots.clear();cpool=[...Array(COLORS.length).keys()];uid=0;
  pbtn.classList.remove('show');
  idleEl.style.opacity='1';dcEl.textContent='0 dots';dcEl.classList.remove('on');
}

// Hold mode
function holdStart(e){
  if(currentScreen!=='finger-screen')return;
  e.preventDefault();
  if(FST==='result'){fingerReset();return;}
  if(FST==='animating')return;
  for(const t of e.changedTouches)makeDot(t.identifier,t.clientX,t.clientY);
  FST='holding';idleEl.style.opacity='0';clearTimeout(htimer);htimer=setTimeout(doPick,1200);
}
function holdMove(e){
  if(currentScreen!=='finger-screen')return;
  e.preventDefault();
  for(const t of e.changedTouches){const d=dots.get(t.identifier);if(d){d.el.style.left=t.clientX+'px';d.el.style.top=t.clientY+'px';d.x=t.clientX;d.y=t.clientY}}
}
function holdEnd(e){
  if(currentScreen!=='finger-screen')return;
  e.preventDefault();
  if(FST==='result'){fingerReset();return}
  if(FST==='animating')return;
  for(const t of e.changedTouches)killDot(t.identifier);
  clearTimeout(htimer);
  if(!dots.size){FST='idle';idleEl.style.opacity='1'}else htimer=setTimeout(doPick,1200);
}
// Tap mode
function tapStart(e){
  if(currentScreen!=='finger-screen')return;
  e.preventDefault();
  if(FST==='result'){fingerReset();return}
  if(FST==='animating')return;
  for(const t of e.changedTouches)makeDot('p'+(uid++),t.clientX,t.clientY);
  idleEl.style.opacity='0';
}
function tapEnd(e){if(currentScreen!=='finger-screen')return;e.preventDefault()}

function applyMode(){
  document.removeEventListener('touchstart',holdStart);
  document.removeEventListener('touchmove',holdMove);
  document.removeEventListener('touchend',holdEnd);
  document.removeEventListener('touchcancel',holdEnd);
  document.removeEventListener('touchstart',tapStart);
  document.removeEventListener('touchend',tapEnd);
  document.removeEventListener('touchcancel',tapEnd);
  if(FMODE==='hold'){
    document.addEventListener('touchstart',holdStart,{passive:false});
    document.addEventListener('touchmove',holdMove,{passive:false});
    document.addEventListener('touchend',holdEnd,{passive:false});
    document.addEventListener('touchcancel',holdEnd,{passive:false});
  } else {
    document.addEventListener('touchstart',tapStart,{passive:false});
    document.addEventListener('touchend',tapEnd,{passive:false});
    document.addEventListener('touchcancel',tapEnd,{passive:false});
  }
}
applyMode();

pbtn.addEventListener('touchstart',e=>{e.stopPropagation();e.preventDefault();doPick()},{passive:false});
pbtn.addEventListener('click',e=>{e.stopPropagation();doPick()});

// SPINNER
// ═══════════════════════════════════════════════════════════════════
const SC = document.getElementById('spinner-canvas');
const SX = SC.getContext('2d');
const SR = document.getElementById('spinner-result');
let sAngle = 0;
let sSpinning = false;

function drawWheel() {
  const size = Math.min(innerWidth - 40, innerHeight - 220);
  SC.width = size;
  SC.height = size;
  SC.style.width = size + 'px';
  SC.style.height = size + 'px';
  const cx = size / 2, cy = size / 2, r = size / 2 - 4;

  SX.clearRect(0, 0, size, size);

  // background circle
  SX.beginPath();
  SX.arc(cx, cy, r, 0, Math.PI * 2);
  SX.fillStyle = '#1a1a28';
  SX.fill();
  SX.strokeStyle = 'rgba(0,255,204,0.2)';
  SX.lineWidth = 2;
  SX.stroke();

  // tick marks
  for (let i = 0; i < 36; i++) {
    const a = sAngle + (i / 36) * Math.PI * 2;
    const big = i % 9 === 0;
    const inner = r - (big ? 20 : 10);
    SX.beginPath();
    SX.moveTo(cx + Math.cos(a) * inner, cy + Math.sin(a) * inner);
    SX.lineTo(cx + Math.cos(a) * (r - 2), cy + Math.sin(a) * (r - 2));
    SX.strokeStyle = big ? 'rgba(0,255,204,0.6)' : 'rgba(0,255,204,0.2)';
    SX.lineWidth = big ? 2.5 : 1;
    SX.stroke();
  }

  // needle pointing UP (at sAngle direction)
  const nLen = r * 0.7;
  const nW = r * 0.06;
  const na = sAngle - Math.PI / 2;
  const tipX = cx + Math.cos(na) * nLen;
  const tipY = cy + Math.sin(na) * nLen;
  const baseX = cx + Math.cos(na + Math.PI) * nW;
  const baseY = cy + Math.sin(na + Math.PI) * nW;
  const lX = cx + Math.cos(na + Math.PI / 2) * nW * 0.5;
  const lY = cy + Math.sin(na + Math.PI / 2) * nW * 0.5;
  const rX = cx + Math.cos(na - Math.PI / 2) * nW * 0.5;
  const rY = cy + Math.sin(na - Math.PI / 2) * nW * 0.5;

  SX.save();
  SX.shadowColor = '#00ffcc';
  SX.shadowBlur = 20;
  SX.beginPath();
  SX.moveTo(tipX, tipY);
  SX.lineTo(lX, lY);
  SX.lineTo(baseX, baseY);
  SX.lineTo(rX, rY);
  SX.closePath();
  SX.fillStyle = '#ffffff';
  SX.fill();

  // green tip
  const tipFrac = 0.3;
  const midX = cx + Math.cos(na) * nLen * (1 - tipFrac);
  const midY = cy + Math.sin(na) * nLen * (1 - tipFrac);
  const mlX = cx + Math.cos(na + Math.PI / 2) * nW * 0.35 + Math.cos(na) * nLen * (1 - tipFrac * 1.5);
  const mlY = cy + Math.sin(na + Math.PI / 2) * nW * 0.35 + Math.sin(na) * nLen * (1 - tipFrac * 1.5);
  const mrX = cx + Math.cos(na - Math.PI / 2) * nW * 0.35 + Math.cos(na) * nLen * (1 - tipFrac * 1.5);
  const mrY = cy + Math.sin(na - Math.PI / 2) * nW * 0.35 + Math.sin(na) * nLen * (1 - tipFrac * 1.5);
  SX.beginPath();
  SX.moveTo(tipX, tipY);
  SX.lineTo(mlX, mlY);
  SX.lineTo(mrX, mrY);
  SX.closePath();
  SX.fillStyle = '#00ffcc';
  SX.fill();
  SX.restore();

  // center dot
  SX.save();
  SX.shadowColor = '#00ffcc';
  SX.shadowBlur = 10;
  SX.beginPath();
  SX.arc(cx, cy, nW * 0.9, 0, Math.PI * 2);
  SX.fillStyle = '#0a0a0f';
  SX.fill();
  SX.strokeStyle = '#00ffcc';
  SX.lineWidth = 2;
  SX.stroke();
  SX.restore();
}

function doSpin() {
  if (sSpinning) return;
  sSpinning = true;
  SR.classList.remove('show');
  const total = (6 + Math.random() * 6) * Math.PI * 2;
  const dur = 3000 + Math.random() * 1000;
  const t0 = performance.now();
  const a0 = sAngle;
  function step(now) {
    const t = Math.min((now - t0) / dur, 1);
    const ease = 1 - Math.pow(1 - t, 4);
    sAngle = a0 + total * ease;
    drawWheel();
    if (t < 1) {
      requestAnimationFrame(step);
    } else {
      sSpinning = false;
      SR.textContent = '✦ chosen ✦';
      SR.classList.add('show');
      burst(innerWidth / 2, innerHeight / 2, '#00ffcc', 40);
    }
  }
  requestAnimationFrame(step);
}

SC.addEventListener('touchstart', e => {
  e.stopPropagation();
  e.preventDefault();
  doSpin();
}, { passive: false });
SC.style.touchAction = 'none';

setTimeout(drawWheel, 50);
addEventListener('resize', () => { if (currentScreen === 'spinner-screen') drawWheel(); });

// ═══════════════════════════════════════════════════════════════════
// COIN FLIP
// ═══════════════════════════════════════════════════════════════════
let coinFlipping=false,coinStreak={side:null,count:0};
const coinEl=document.getElementById('coin');
const coinResult=document.getElementById('coin-result');
const coinStreakEl=document.getElementById('coin-streak');

function doFlip(){
  if(coinFlipping)return;
  coinFlipping=true;coinResult.classList.remove('show');
  const isHeads=Math.random()<.5;
  // random extra spins 3-7 full rotations plus land on correct face
  const spins=3+Math.floor(Math.random()*5);
  const baseDeg=spins*360+(isHeads?0:180);
  // add small random nudge so it doesn't always land perfectly
  const nudge=(Math.random()-.5)*20;
  const finalDeg=baseDeg+nudge;
  coinEl.style.setProperty('--flips',finalDeg+'deg');
  coinEl.style.animation='none';
  coinEl.offsetHeight;
  coinEl.style.animation='coinflip 1s ease forwards';
  setTimeout(()=>{
    coinFlipping=false;
    const side=isHeads?'heads':'tails';
    coinResult.textContent=isHeads?'HEADS':'TAILS';
    coinResult.className='';coinResult.classList.add(side,'show');
    // streak
    if(coinStreak.side===side){coinStreak.count++}else{coinStreak={side,count:1}}
    if(coinStreak.count>=2)coinStreakEl.textContent=`${coinStreak.count}× ${side.toUpperCase()} in a row!`;
    else coinStreakEl.textContent='';
    burst(innerWidth/2,innerHeight*.4,isHeads?'#ffd700':'#c0c0c0',40);
    // reset coin rotation for next flip
    setTimeout(()=>{coinEl.style.animation='none';coinEl.style.transform=`rotateY(${isHeads?0:180}deg)`;},50);
  },1050);
}

document.getElementById('coin-wrap').addEventListener('touchstart',e=>{e.preventDefault();doFlip()},{passive:false});
document.getElementById('coin-wrap').addEventListener('click',doFlip);

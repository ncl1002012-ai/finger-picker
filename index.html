<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Finger Picker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono:wght@400;700&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#0a0a0f;--sur:#13131d;--bor:#1e1e30;--acc:#00ffcc;--txt:#e8e8f0;--dim:#3a3a55}
  html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:'Syne',sans-serif;color:var(--txt);touch-action:none;user-select:none;-webkit-user-select:none}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,255,204,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,204,0.03) 1px,transparent 1px);background-size:55px 55px;pointer-events:none;z-index:0}
  body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at center,transparent 20%,rgba(10,10,15,0.88) 100%);pointer-events:none;z-index:0}
  canvas{position:fixed;inset:0;pointer-events:none}
  #lc{z-index:8}#pc{z-index:15}
  #idle{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;z-index:10;pointer-events:none;transition:opacity .4s}
  #idle h1{font-size:clamp(2.8rem,9vw,5.5rem);font-weight:800;background:linear-gradient(135deg,var(--acc),#00aaff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;margin-bottom:.45em}
  #idle p{font-family:'Space Mono',monospace;font-size:clamp(.62rem,2vw,.85rem);color:var(--dim);letter-spacing:.18em;text-transform:uppercase}
  .dot{position:fixed;width:80px;height:80px;border-radius:50%;transform:translate(-50%,-50%) scale(0);pointer-events:none;z-index:5;transition:transform .2s cubic-bezier(.34,1.56,.64,1);display:flex;align-items:center;justify-content:center}
  .dot.on{transform:translate(-50%,-50%) scale(1)}
  .di{width:58px;height:58px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:1.1rem;font-weight:700;position:relative}
  .dr{position:absolute;inset:-12px;border-radius:50%;border:2px solid;opacity:.4;animation:pr 1.6s ease-in-out infinite}
  @keyframes pr{0%,100%{transform:scale(1);opacity:.4}50%{transform:scale(1.18);opacity:.12}}
  .dot.winner .di{animation:wp .55s cubic-bezier(.34,1.56,.64,1) forwards}
  @keyframes wp{0%{transform:scale(1)}50%{transform:scale(1.5)}100%{transform:scale(1.25)}}
  .dot.loser{animation:lo .3s ease forwards}
  @keyframes lo{to{transform:translate(-50%,-50%) scale(0);opacity:0}}
  #pbtn{position:fixed;bottom:2.5rem;left:50%;transform:translateX(-50%) scale(0);z-index:20;background:var(--acc);color:#0a0a0f;font-family:'Syne',sans-serif;font-weight:800;font-size:1rem;letter-spacing:.1em;text-transform:uppercase;border:none;border-radius:100px;padding:.85rem 2.4rem;cursor:pointer;box-shadow:0 0 30px rgba(0,255,204,.4),0 0 60px rgba(0,255,204,.2);transition:transform .3s cubic-bezier(.34,1.56,.64,1);touch-action:manipulation}
  #pbtn.show{transform:translateX(-50%) scale(1)}
  #wb{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);z-index:30;text-align:center;pointer-events:none;transition:transform .5s cubic-bezier(.34,1.56,.64,1)}
  #wb.show{transform:translate(-50%,-50%) scale(1)}
  #wb .wl{font-family:'Space Mono',monospace;font-size:clamp(.55rem,1.8vw,.8rem);letter-spacing:.35em;text-transform:uppercase;color:var(--dim);margin-bottom:.3em}
  #wb .wn{font-size:clamp(3rem,13vw,8rem);font-weight:800;line-height:1;filter:drop-shadow(0 0 40px currentColor)}
  #rh{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);font-family:'Space Mono',monospace;font-size:.65rem;letter-spacing:.22em;text-transform:uppercase;color:var(--dim);opacity:0;transition:opacity .5s;z-index:30;pointer-events:none}
  #rh.show{opacity:1}
  #dc{position:fixed;top:1.4rem;left:50%;transform:translateX(-50%);font-family:'Space Mono',monospace;font-size:.7rem;letter-spacing:.12em;color:var(--dim);z-index:20;pointer-events:none;transition:color .3s}
  #dc.on{color:var(--acc)}
  #sb{position:fixed;top:.9rem;left:.9rem;z-index:50;width:20px;height:20px;background:none;border:none;cursor:pointer;opacity:.2;transition:opacity .2s;padding:0;touch-action:manipulation}
  #sb:hover{opacity:.6}
  #sb svg{width:100%;height:100%;fill:none;stroke:var(--txt);stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
  #sp{position:fixed;top:2.6rem;left:.9rem;z-index:50;background:var(--sur);border:1px solid var(--bor);border-radius:12px;padding:.9rem 1rem;min-width:185px;box-shadow:0 8px 32px rgba(0,0,0,.55);transform-origin:top left;transform:scale(0);opacity:0;transition:transform .2s cubic-bezier(.34,1.56,.64,1),opacity .15s;pointer-events:none}
  #sp.open{transform:scale(1);opacity:1;pointer-events:all}
  #sp h3{font-family:'Space Mono',monospace;font-size:.58rem;letter-spacing:.25em;text-transform:uppercase;color:var(--dim);margin-bottom:.7rem}
  .mo{display:flex;align-items:flex-start;gap:.55rem;padding:.5rem 0;cursor:pointer}
  .mo:not(:last-child){border-bottom:1px solid var(--bor)}
  .mr{width:13px;height:13px;border-radius:50%;border:2px solid var(--dim);flex-shrink:0;margin-top:3px;position:relative;transition:border-color .2s}
  .mr::after{content:'';position:absolute;inset:2px;border-radius:50%;background:var(--acc);transform:scale(0);transition:transform .2s cubic-bezier(.34,1.56,.64,1)}
  .mo.sel .mr{border-color:var(--acc)}
  .mo.sel .mr::after{transform:scale(1)}
  .mt{font-size:.78rem;font-weight:700;color:var(--txt);margin-bottom:.12rem}
  .md{font-family:'Space Mono',monospace;font-size:.56rem;color:var(--dim);line-height:1.5}
</style>
</head>
<body>
<canvas id="lc"></canvas>
<canvas id="pc"></canvas>

<button id="sb" aria-label="Settings">
  <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
</button>

<div id="sp">
  <h3>Mode</h3>
  <div class="mo sel" data-mode="hold">
    <div class="mr"></div>
    <div><div class="mt">Hold</div><div class="md">Keep fingers down.<br>Lift = restart timer.</div></div>
  </div>
  <div class="mo" data-mode="tap">
    <div class="mr"></div>
    <div><div class="mt">Tap to Place</div><div class="md">Each tap drops a dot.<br>No finger limit.</div></div>
  </div>
</div>

<div id="idle"><h1>FINGER<br>PICKER</h1><p id="isub">Place fingers — hold still</p></div>
<div id="dc">0 dots</div>
<button id="pbtn">Pick ✦</button>
<div id="wb"><div class="wl">chosen</div><div class="wn" id="wn">✦</div></div>
<div id="rh">tap anywhere to reset</div>

<script>
const COLORS=[
  {bg:'#00ffcc',tx:'#0a0a0f',gl:'rgba(0,255,204,0.7)'},
  {bg:'#ff3366',tx:'#fff',gl:'rgba(255,51,102,0.7)'},
  {bg:'#ffd700',tx:'#0a0a0f',gl:'rgba(255,215,0,0.7)'},
  {bg:'#aa44ff',tx:'#fff',gl:'rgba(170,68,255,0.7)'},
  {bg:'#00aaff',tx:'#fff',gl:'rgba(0,170,255,0.7)'},
  {bg:'#ff6600',tx:'#fff',gl:'rgba(255,102,0,0.7)'},
  {bg:'#00ff88',tx:'#0a0a0f',gl:'rgba(0,255,136,0.7)'},
  {bg:'#ff44cc',tx:'#fff',gl:'rgba(255,68,204,0.7)'},
  {bg:'#44ffee',tx:'#0a0a0f',gl:'rgba(68,255,238,0.7)'},
  {bg:'#ffaa00',tx:'#0a0a0f',gl:'rgba(255,170,0,0.7)'},
  {bg:'#ff4444',tx:'#fff',gl:'rgba(255,68,68,0.7)'},
  {bg:'#fffbe6',tx:'#0a0a0f',gl:'rgba(255,251,230,0.7)'},
];

let MODE='hold', ST='idle';
let dots=new Map(), cpool=[...Array(COLORS.length).keys()];
let uid=0, htimer=null;
let particles=[], bolts=[];
let spOpen=false;

const idleEl=document.getElementById('idle');
const isubEl=document.getElementById('isub');
const dcEl=document.getElementById('dc');
const pbtn=document.getElementById('pbtn');
const wbEl=document.getElementById('wb');
const wnEl=document.getElementById('wn');
const rhEl=document.getElementById('rh');
const sbEl=document.getElementById('sb');
const spEl=document.getElementById('sp');
const lc=document.getElementById('lc'), lx=lc.getContext('2d');
const pc=document.getElementById('pc'), px=pc.getContext('2d');

function resize(){lc.width=pc.width=innerWidth;lc.height=pc.height=innerHeight}
resize();addEventListener('resize',resize);

// Settings
function toggleSP(e){e.stopPropagation();e.preventDefault();spOpen=!spOpen;spEl.classList.toggle('open',spOpen)}
sbEl.addEventListener('touchstart',toggleSP,{passive:false});
sbEl.addEventListener('click',toggleSP);
document.addEventListener('touchstart',e=>{
  if(!spEl.contains(e.target)&&e.target!==sbEl&&spOpen){spOpen=false;spEl.classList.remove('open')}
},{passive:true});

document.querySelectorAll('.mo').forEach(opt=>{
  function choose(e){
    e.stopPropagation();e.preventDefault();
    const m=opt.dataset.mode;
    spOpen=false;spEl.classList.remove('open');
    if(m===MODE)return;
    MODE=m;
    document.querySelectorAll('.mo').forEach(o=>o.classList.remove('sel'));
    opt.classList.add('sel');
    isubEl.textContent=MODE==='hold'?'Place fingers — hold still':'Tap to place dots — then pick';
    reset();
  }
  opt.addEventListener('touchstart',choose,{passive:false});
  opt.addEventListener('click',choose);
});

// Colors
function gc(){if(!cpool.length)cpool=[...Array(COLORS.length).keys()];return cpool.splice(Math.floor(Math.random()*cpool.length),1)[0]}
function fc(i){cpool.push(i)}

// Dots
function makeDot(id,x,y){
  if(dots.has(id))return;
  const ci=gc(),c=COLORS[ci];
  const el=document.createElement('div');
  el.className='dot';
  el.style.cssText=`left:${x}px;top:${y}px`;
  el.innerHTML=`<div class="di" style="background:${c.bg};color:${c.tx};box-shadow:0 0 20px ${c.gl},0 0 50px ${c.gl}"><span class="dr" style="border-color:${c.bg}"></span>✦</div>`;
  document.body.appendChild(el);
  requestAnimationFrame(()=>el.classList.add('on'));
  dots.set(id,{el,ci,x,y,color:c});
  refreshUI();
}
function killDot(id){
  const d=dots.get(id);if(!d)return;
  fc(d.ci);d.el.remove();dots.delete(id);refreshUI();
}
function refreshUI(){
  const n=dots.size;
  dcEl.textContent=n===1?'1 dot':`${n} dots`;
  dcEl.classList.toggle('on',n>0);
  pbtn.classList.toggle('show',MODE==='tap'&&n>=2&&ST==='idle');
}

// Lightning
function seg(ax,ay,bx,by,d){
  if(d===0)return[[ax,ay],[bx,by]];
  const r=80/(d+1),mx=(ax+bx)/2+(Math.random()-.5)*r,my=(ay+by)/2+(Math.random()-.5)*r;
  return[...seg(ax,ay,mx,my,d-1),...seg(mx,my,bx,by,d-1).slice(1)];
}
function flashAll(){
  const dl=[...dots.values()];
  for(let i=0;i<dl.length;i++)for(let j=i+1;j<dl.length;j++){
    const a=dl[i],b=dl[j];
    bolts.push({pts:seg(a.x,a.y,b.x,b.y,4),ca:a.color.bg,life:1});
  }
}

// Particles
function burst(x,y,col,n=45){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,s=3+Math.random()*10;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,decay:.018+Math.random()*.025,sz:3+Math.random()*7,col});
  }
}

// Render
(function loop(){
  lx.clearRect(0,0,lc.width,lc.height);
  bolts=bolts.filter(b=>b.life>0);
  for(const b of bolts){
    b.life-=.03;
    lx.save();lx.globalAlpha=Math.max(0,b.life);lx.shadowBlur=16;lx.shadowColor=b.ca;
    lx.strokeStyle=b.ca;lx.lineWidth=1+b.life*2;
    lx.beginPath();lx.moveTo(b.pts[0][0],b.pts[0][1]);
    for(let k=1;k<b.pts.length;k++)lx.lineTo(b.pts[k][0],b.pts[k][1]);
    lx.stroke();lx.restore();
    if(Math.random()<.35){const p=b.pts;b.pts=seg(p[0][0],p[0][1],p[p.length-1][0],p[p.length-1][1],4)}
  }
  px.clearRect(0,0,pc.width,pc.height);
  particles=particles.filter(p=>p.life>0);
  for(const p of particles){
    p.x+=p.vx;p.y+=p.vy;p.vy+=.25;p.vx*=.97;p.life-=p.decay;
    px.globalAlpha=Math.max(0,p.life);px.fillStyle=p.col;
    px.beginPath();px.arc(p.x,p.y,p.sz*p.life,0,Math.PI*2);px.fill();
  }
  px.globalAlpha=1;
  requestAnimationFrame(loop);
})();

// Pick
function doPick(){
  if(dots.size<1||ST==='animating'||ST==='result')return;
  ST='animating';pbtn.classList.remove('show');idleEl.style.opacity='0';clearTimeout(htimer);
  const dl=[...dots.values()];let f=0;
  function flash(){
    flashAll();
    dl.forEach(d=>{
      d.el.style.transition='transform .08s ease';
      d.el.style.transform=`translate(-50%,-50%) scale(${1.05+Math.random()*.12})`;
      setTimeout(()=>{if(d.el.isConnected)d.el.style.transform='translate(-50%,-50%) scale(1)'},100);
    });
    if(++f<10)setTimeout(flash,100+Math.random()*80);
    else setTimeout(reveal,180);
  }
  flash();
}
function reveal(){
  if(!dots.size){reset();return}
  ST='result';bolts=[];
  const ids=[...dots.keys()],wid=ids[Math.floor(Math.random()*ids.length)],w=dots.get(wid);
  w.el.style.transition='transform .2s cubic-bezier(.34,1.56,.64,1)';
  w.el.classList.add('winner');w.el.style.zIndex='25';
  burst(w.x,w.y,w.color.bg,70);
  for(const[id,d]of dots){if(id!==wid){d.el.classList.add('loser');setTimeout(()=>d.el.remove(),350)}}
  wnEl.textContent='✦ CHOSEN ✦';wnEl.style.color=w.color.bg;wnEl.style.filter=`drop-shadow(0 0 30px ${w.color.bg})`;
  wbEl.classList.add('show');rhEl.classList.add('show');dcEl.textContent='';
}
function reset(){
  clearTimeout(htimer);ST='idle';bolts=[];
  for(const[,d]of dots)d.el.remove();
  dots.clear();cpool=[...Array(COLORS.length).keys()];uid=0;
  wbEl.classList.remove('show');rhEl.classList.remove('show');pbtn.classList.remove('show');
  idleEl.style.opacity='1';dcEl.textContent='0 dots';dcEl.classList.remove('on');
}

// ── HOLD mode: one global touchstart handler ──────────────────────────────────
function holdStart(e){
  e.preventDefault();
  if(ST==='result'){reset();return}
  if(ST==='animating')return;
  for(const t of e.changedTouches)makeDot(t.identifier,t.clientX,t.clientY);
  ST='holding';idleEl.style.opacity='0';
  clearTimeout(htimer);htimer=setTimeout(doPick,1200);
}
function holdMove(e){
  e.preventDefault();
  for(const t of e.changedTouches){
    const d=dots.get(t.identifier);
    if(d){d.el.style.left=t.clientX+'px';d.el.style.top=t.clientY+'px';d.x=t.clientX;d.y=t.clientY}
  }
}
function holdEnd(e){
  e.preventDefault();
  if(ST==='result'){reset();return}
  if(ST==='animating')return;
  for(const t of e.changedTouches)killDot(t.identifier);
  clearTimeout(htimer);
  if(!dots.size){ST='idle';idleEl.style.opacity='1'}
  else htimer=setTimeout(doPick,1200);
}

// ── TAP mode: ONE handler only on touchstart, nothing on touchend ─────────────
function tapStart(e){
  e.preventDefault();
  if(ST==='result'){reset();return}
  if(ST==='animating')return;
  // Each touch gets a brand-new permanent id that has nothing to do with the touch
  for(const t of e.changedTouches)makeDot('p'+(uid++),t.clientX,t.clientY);
  idleEl.style.opacity='0';
}

// Pick button
pbtn.addEventListener('touchstart',e=>{e.stopPropagation();e.preventDefault();doPick()},{passive:false});
pbtn.addEventListener('click',e=>{e.stopPropagation();doPick()});

// ── Single switch point — swap between the two sets of listeners ──────────────
function applyMode(){
  // Tear everything down first
  document.removeEventListener('touchstart',holdStart);
  document.removeEventListener('touchmove', holdMove);
  document.removeEventListener('touchend',  holdEnd);
  document.removeEventListener('touchcancel',holdEnd);
  document.removeEventListener('touchstart',tapStart);

  if(MODE==='hold'){
    document.addEventListener('touchstart', holdStart,{passive:false});
    document.addEventListener('touchmove',  holdMove, {passive:false});
    document.addEventListener('touchend',   holdEnd,  {passive:false});
    document.addEventListener('touchcancel',holdEnd,  {passive:false});
  } else {
    // TAP: only touchstart. No touchend = dots are never removed by touch events.
    document.addEventListener('touchstart',tapStart,{passive:false});
  }
}
applyMode();

// Re-apply after mode switch (settings touchstart already fired, so defer)
document.querySelectorAll('.mo').forEach(o=>{
  o.addEventListener('touchstart',()=>setTimeout(applyMode,50),{passive:true});
  o.addEventListener('click',()=>setTimeout(applyMode,50));
});
</script>

</body>
</html>
